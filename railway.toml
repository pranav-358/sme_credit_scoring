[build]
builder = "nixpacks"

[deploy]
startCommand = "python reset_db.py && gunicorn --chdir backend 'app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
region = "asia-southeast1"