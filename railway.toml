[build]
builder = "nixpacks"

[deploy]
startCommand = "python reset_db.py && gunicorn --chdir backend 'app:create_app()' --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --keep-alive 5 --max-requests 100 --max-requests-jitter 10"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5