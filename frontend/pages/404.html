<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>404 | SMECreditAI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'DM Sans',sans-serif; background:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; margin:0; }
    .card { background:white; border:1px solid #e2e8f0; border-radius:20px; padding:3rem 2.5rem; max-width:420px; width:100%; text-align:center; }
    .num { font-family:'DM Mono',monospace; font-size:5rem; font-weight:500; color:#1a56db; line-height:1; margin-bottom:0.5rem; }
    h1 { font-size:1.3rem; font-weight:700; margin-bottom:0.5rem; }
    p  { color:#64748b; font-size:0.875rem; margin-bottom:2rem; line-height:1.6; }
    a  { display:inline-block; padding:0.65rem 1.5rem; background:#1a56db; color:white; border-radius:10px; text-decoration:none; font-weight:600; font-size:0.875rem; transition:all 0.2s; }
    a:hover { background:#1e40af; transform:translateY(-1px); }
  </style>
</head>
<body>
<div class="card">
  <div class="num">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>

</div>

</html>
